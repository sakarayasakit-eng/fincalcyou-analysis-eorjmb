# Netlify configuration: security + performance headers
# These apply to all routes when deployed via Netlify

[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking protection (belt-and-braces with CSP frame-ancestors)
    X-Frame-Options = "DENY"

    # Prevent MIME-sniffing attacks
    X-Content-Type-Options = "nosniff"

    # HSTS: force HTTPS for 1 year including subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Referrer policy: don't leak full URL to other sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser APIs that the calculator doesn't need
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"

    # Cross-origin isolation (safe for this app)
    Cross-Origin-Resource-Policy = "same-origin"
    Cross-Origin-Opener-Policy = "same-origin"

[[headers]]
  # Long-cache static assets
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # Short cache for HTML so updates roll out quickly
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
